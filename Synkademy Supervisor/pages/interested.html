<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interested Projects - Synkademy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    /* Custom Palette Overrides */
    :root {
      --sys-bg: #F9FBF9;
      --sys-text: #1B1B1B;
      --sys-green-dark: #157F1F;
      --sys-green-light: #4CB963;
      --sys-gold: #FBC02D;
      --sys-purple: #47479D;
      --sys-navy: #313B58;
    }

    /* Search Bar */
    .search-container {
      margin-bottom: 24px;
    }
    .search-input {
      width: 100%;
      padding: 14px 20px;
      border: 2px solid #e2e8f0;
      border-radius: var(--sv-radius);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--sys-purple);
    }

    /* Banners */
    .interest-banner {
      background: var(--sv-white);
      border-radius: var(--sv-radius);
      padding: 20px;
      box-shadow: var(--sv-shadow-sm);
      margin-bottom: 16px;
      border-left: 5px solid var(--sys-purple);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .interest-banner:hover {
      transform: translateY(-2px);
      box-shadow: var(--sv-shadow-md);
    }
    .banner-title {
      color: var(--sys-navy);
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .banner-desc {
      color: var(--sv-gray-600);
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 600px;
    }
    
    /* Tags */
    .area-chip {
      background: rgba(71, 71, 157, 0.1);
      color: var(--sys-purple);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-right: 6px;
      display: inline-block;
      margin-top: 8px;
    }

    /* Detail View */
    #detail-view {
      background: var(--sv-white);
      padding: 30px;
      border-radius: var(--sv-radius);
      box-shadow: var(--sv-shadow-sm);
      border-top: 6px solid var(--sys-green-light);
    }
    .detail-section { margin-bottom: 24px; }
    .detail-section h4 {
      color: var(--sys-navy);
      margin-bottom: 8px;
      font-size: 1.1rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 4px;
    }
    .btn-back {
      background: var(--sys-navy);
      color: var(--sv-white);
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .btn-match {
      background: var(--sys-green-light);
      color: var(--sv-white);
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-match:hover { background: var(--sys-green-dark); }
  </style>
</head>
<body>
  <div class="sv-app-layout">
    <div id="nav-container"></div>
    
    <main class="sv-main-area">
      <header class="sv-header">
        <div>
            <h1 class="sv-page-title">Interested Projects</h1>
            <p style="color: var(--sv-gray-600); font-size: 0.9rem; margin-top: 4px;">Your shortlisted proposals pending assignment.</p>
        </div>
        <div class="sv-user-block">
          <span class="sv-role-tag" style="background: var(--sys-gold);">Supervisor</span>
          <span id="userName">Loading...</span>
        </div>
      </header>

      <div id="list-view">
        <div class="search-container">
          <input type="text" id="searchInput" class="search-input" placeholder="Search by title, tech stack, or area...">
        </div>
        <div id="banners-container">
          <div style="text-align:center; padding: 40px;">Loading your interests...</div>
        </div>
      </div>

      <div id="detail-view" style="display: none;">
        <button class="btn-back" onclick="showListView()">← Back to List</button>
        
        <h2 id="detail-title" style="color: var(--sys-navy); margin-bottom: 12px; font-size: 1.8rem;">Project Title</h2>
        <div id="detail-areas" style="margin-bottom: 24px;"></div>
        
        <div class="detail-section">
          <h4>Proposal Abstract</h4>
          <p id="detail-desc" style="color: var(--sys-text); line-height: 1.6;"></p>
        </div>

        <div class="detail-section">
          <h4>Tech Stack</h4>
          <p id="detail-tech" style="color: var(--sys-purple); font-weight: 600;"></p>
        </div>
        
        <div style="margin-top: 30px;">
          <button class="btn-match" id="matchBtn" onclick="confirmMatch()">Confirm Match</button>
        </div>
      </div>

    </main>
  </div>

  <script src="../js/session.js"></script>
  <script src="../js/include.js"></script>
  <script src="../js/interested.js"></script>
</body>
</html>
