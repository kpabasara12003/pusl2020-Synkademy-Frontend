<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Synkademy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="sv-app-layout">
    <div id="nav-container"></div>
    
    <main class="sv-main-area">
      <header class="sv-header">
        <h1 class="sv-page-title">Dashboard Overview</h1>
        <div class="sv-user-block">
          <span class="sv-role-tag">Supervisor</span>
          <span id="userName">Loading...</span>
        </div>
      </header>

      <section id="dashboard-content">
        <div class="sv-card-grid">
          <div class="sv-stat-card">
            <h3>Interested</h3>
            <p class="num" id="stat-int">0</p>
          </div>
          <div class="sv-stat-card">
            <h3>Assigned</h3>
            <p class="num" id="stat-assign">0</p>
          </div>
        </div>

        

        <div class="sv-panel">
          <h3> Quick Activity Log</h3>
          <p style="color:var(--sv-gray-600); margin-top:8px;">No recent actions yet. Start by browsing new projects.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/session.js"></script>
  <script src="../js/include.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
