<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synkademy | Admin Portal</title>

<style>
:root {
  --bg-body: #F8FAFC; 
  --bg-surface: #FFFFFF;
  --border-color: #E2E8F0;
  
  --text-primary: #0F172A;
  --text-secondary: #64748B;
  
  --brand-primary: #1E293B; 
  --brand-accent: #2563EB; 
  
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: var(--font-family); }

body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-body);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

.login-wrapper {
  width: 100%;
  max-width: 400px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.brand-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 2rem;
}

.brand-logo {
  background-color: var(--brand-accent);
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 1.25rem;
}

.brand-name {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--brand-primary);
}

.login-card {
  width: 100%;
  padding: 2.5rem 2rem;
  border-radius: 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border-color);
  box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
}

.card-header {
  text-align: center;
  margin-bottom: 2rem;
}

.card-header h2 {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
}

.text-muted {
  color: var(--text-secondary);
  font-size: 0.875rem;
}

.form-group {
  margin-bottom: 1.25rem;
}

.form-group label {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  margin-bottom: 0.5rem;
  color: var(--text-primary);
}

.input-wrapper {
  position: relative;
}

.form-group input {
  width: 100%;
  font-size: 0.875rem;
  padding: 0.6rem 1rem;
  border-radius: 6px;
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  transition: all 0.2s ease;
  outline: none;
}

.form-group input:focus {
  border-color: var(--brand-accent);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.toggle-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--brand-accent);
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
}

.toggle-btn:hover {
  text-decoration: underline;
}

.btn-primary {
  width: 100%;
  padding: 0.65rem;
  border: none;
  border-radius: 6px;
  background: var(--brand-accent);
  color: white;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.2s;
  margin-top: 0.5rem;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.btn-primary:hover {
  background: #1D4ED8;
}

.btn-primary:disabled {
  background: #93C5FD;
  cursor: not-allowed;
}

.error {
  text-align: center;
  font-size: 0.85rem;
  font-weight: 500;
  margin-top: 1rem;
  padding: 0.5rem;
  border-radius: 4px;
  background-color: #FEF2F2;
  color: #DC2626;
  border: 1px solid #FECACA;
  display: none;
}

</style>
</head>
<body>

<div class="login-wrapper">
  <div class="brand-header">
    <div class="brand-logo">S</div>
    <span class="brand-name">Synkademy</span>
  </div>

  <div class="login-card">
    <div class="card-header">
      <h2>Admin Portal</h2>
      <p class="text-muted">Sign in to the Module Leader dashboard</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="name@nsbm.ac.lk" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" required>
          <button type="button" class="toggle-btn" id="toggleText" onclick="togglePass()">Show</button>
        </div>
      </div>

      <button class="btn-primary" id="loginBtn" type="submit">Sign In</button>
      <div class="error" id="errorMsg" style="display:none;"></div>
    </form>
  </div>
</div>

<script>
const SESSION_NAME = "synkademy_moduleleader_session";

(function () {
  const user = getSession(SESSION_NAME);
  if (user && window.location.pathname.includes("index")) {
    window.location.href = "dashboard.html";
  }
})();

function showMessage(text, type = "error") {
  const msg = document.getElementById("errorMsg");

  msg.innerText = text;
  msg.style.display = text ? "block" : "none";
}

function togglePass() {
  const p = document.getElementById("password");
  const t = document.getElementById("toggleText");

  if (p.type === "password") {
    p.type = "text";
    t.innerText = "Hide";
  } else {
    p.type = "password";
    t.innerText = "Show";
  }
}

async function handleLogin(e) {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn = document.getElementById("loginBtn");

  showMessage("");

  if (!email || !password) {
    showMessage("All fields are required");
    return;
  }

  if (!validateEmail(email)) {
    showMessage("Invalid email format");
    return;
  }

  try {
    btn.innerText = "Checking...";
    btn.disabled = true;

    const response = await fetch("http://localhost:5037/api/Auth/moduleleader-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    if (!response.ok) {
      let errorMsg = "Login failed";
      try {
        errorMsg = await response.text();
      } catch {}
      showMessage(errorMsg);
      return;
    }

    const data = await response.json();

    if (!data.role || data.role.toLowerCase() !== "moduleleader") {
      showMessage("Access denied. You are not a module leader.");
      return;
    }

    setSession(SESSION_NAME, data, 1/24);

    window.location.href = "dashboard.html";

  } catch (err) {
    console.error(err);
    showMessage("Server error. Please try again.");
  } finally {
    btn.innerText = "Sign In";
    btn.disabled = false;
  }
}

function setSession(name, value, days) {
  const date = new Date();
  date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));

  document.cookie = `${name}=${encodeURIComponent(JSON.stringify(value))};expires=${date.toUTCString()};path=/`;
}

function getSession(name) {
  const cname = name + "=";
  const decoded = decodeURIComponent(document.cookie);
  const cookies = decoded.split(";");

  for (let c of cookies) {
    c = c.trim();
    if (c.indexOf(cname) === 0) {
      return JSON.parse(c.substring(cname.length));
    }
  }
  return null;
}

function logout() {
  document.cookie = `${SESSION_NAME}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
  window.location.href = "index.html";
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
</script>

</body>
</html>
