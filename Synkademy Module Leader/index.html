<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
:root {
  --green: #117F17;
  --moss: #2BC333;
  --gold: #fbc02d;
  --soft: #FADE93;
  --bg: #f9fbf9;
  --text: #1b1b1b;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
}

.container{
  width:360px;
  padding:40px;
  border-radius:20px;
  background:white;
  box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  margin-bottom:10px;
  color:var(--green);
}

h3{
  text-align:center;
  margin-bottom:25px;
  margin-top: 10px;
  color:var(--moss);
}
.input-group{
  position:relative;
  margin-bottom:18px;
}

.input-group input{
  width:100%;
  font-size:15px;
  padding:12px 40px 12px 12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.input-group input:focus{
  outline:none;
  border-color:var(--green);
  box-shadow:0 0 0 2px rgba(17,127,23,0.15);
}

.input-group img{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  opacity:.5;
}

.toggle{
  position:absolute;
  right:35px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:12px;
  color:var(--green);
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--green),var(--moss));
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.error{
  margin-top:10px;
  text-align:center;
  font-size:13px;
  color:red;
  display:none;
}

</style>
</head>
<body>

<div class="container">
  <h1>Synkademy</h1>
  <h3>Module Leader/Admin</h3>

  <form id="loginForm">

    <div class="input-group">
      <input type="text" id="username" placeholder="Username" required>
      <img src="https://img.icons8.com/ios-filled/100/user.png">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password" required>
      <span class="toggle" onclick="togglePass()">Show</span>
      <img src="https://img.icons8.com/ios-filled/100/lock.png">
    </div>

    <button class="btn" id="loginBtn" type="submit">Login</button>
    <div class="error" id="errorMsg">Invalid credentials</div>

  </form>
</div>

<script>
const form=document.getElementById("loginForm");
const errorMsg=document.getElementById("errorMsg");

function togglePass(){
  const p=document.getElementById("password");
  p.type=p.type==="password"?"text":"password";
}

form.addEventListener("submit",function(e){
  e.preventDefault();

  const user=document.getElementById("username").value;
  const pass=document.getElementById("password").value;

  if(user==="admin"&&pass==="1234"){
    alert("Login success");
  }else{
    errorMsg.style.display="block";
  }
});
</script>

</body>
</html>
