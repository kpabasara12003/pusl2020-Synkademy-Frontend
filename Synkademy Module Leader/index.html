<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Leader Login</title>

<style>
:root {
  --green: #117F17;
  --moss: #2BC333;
  --gold: #fbc02d;
  --soft: #FADE93;
  --bg: #f9fbf9;
  --text: #1b1b1b;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
}

.container{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:white;
  box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  margin-bottom:10px;
  color:var(--green);
}

h3{
  text-align:center;
  margin-bottom:25px;
  margin-top: 10px;
  color:var(--moss);
}
.input-group{
  position:relative;
  margin-bottom:18px;
}

.input-group input{
  width:100%;
  font-size:15px;
  padding:12px 40px 12px 12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.input-group input:focus{
  outline:none;
  border-color:var(--green);
  box-shadow:0 0 0 2px rgba(17,127,23,0.15);
}

.input-group img{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  width:18px;
  opacity:.5;
}

.toggle{
  position:absolute;
  right:35px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:12px;
  color:var(--green);
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background: var(--gold);
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.error{
  text-align:center;
  font-size:15px;
  font-weight: bold;
  margin-top:4px;
  color:red;
  display:none;
}

</style>
</head>
<body>

<div class="container">
  <h1>Synkademy</h1>
  <h3>Module Leader / Admin</h3>

  <form id="loginForm" onsubmit="handleLogin(event)">

    <div class="input-group">
      <input type="email" id="email" placeholder="Email address" required>
      <img src="https://img.icons8.com/ios-filled/100/user.png">
    </div>

    <div class="input-group">
      <input type="password" id="password" placeholder="Password" required>
      <span class="toggle" id="toggleText" onclick="togglePass()">Show</span>
      <img src="https://img.icons8.com/ios-filled/100/lock.png">
    </div>

    <button class="btn" id="loginBtn" type="submit">Login</button>
    <div class="error" id="errorMsg" style="display:none;"></div>
  </form>
</div>
<script>

const SESSION_NAME = "synkademy_moduleleader_session";

(function () {
  const user = getSession(SESSION_NAME);
  if (user && window.location.pathname.includes("index")) {
    window.location.href = "dashboard.html";
  }
})();

function showMessage(text, type = "error") {
  const msg = document.getElementById("errorMsg");

  msg.innerText = text;
  msg.style.display = text ? "block" : "none";
  msg.style.color = type === "error" ? "red" : "green";
}

function togglePass() {
  const p = document.getElementById("password");
  const t = document.getElementById("toggleText");

  if (p.type === "password") {
    p.type = "text";
    t.innerText = "Hide";
  } else {
    p.type = "password";
    t.innerText = "Show";
  }
}

async function handleLogin(e) {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn = document.getElementById("loginBtn");

  showMessage("");

  if (!email || !password) {
    showMessage("All fields are required");
    return;
  }

  if (!validateEmail(email)) {
    showMessage("Invalid email format");
    return;
  }

  try {
    btn.innerText = "Checking...";
    btn.disabled = true;

    const response = await fetch("http://localhost:5037/api/Auth/moduleleader-login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    if (!response.ok) {
      let errorMsg = "Login failed";
      try {
        errorMsg = await response.text();
      } catch {}
      showMessage(errorMsg);
      return;
    }

    const data = await response.json();

    if (!data.role || data.role.toLowerCase() !== "moduleleader") {
      showMessage("Access denied. You are not a module leader.");
      return;
    }

    setSession(SESSION_NAME, data, 1/24);

  
    window.location.href = "dashboard.html";

  } catch (err) {
    console.error(err);
    showMessage("Server error. Please try again.");
  } finally {
    btn.innerText = "Login";
    btn.disabled = false;
  }
}

function setSession(name, value, days) {
  const date = new Date();
  date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));

  document.cookie = `${name}=${encodeURIComponent(JSON.stringify(value))};expires=${date.toUTCString()};path=/`;
}

function getSession(name) {
  const cname = name + "=";
  const decoded = decodeURIComponent(document.cookie);
  const cookies = decoded.split(";");

  for (let c of cookies) {
    c = c.trim();
    if (c.indexOf(cname) === 0) {
      return JSON.parse(c.substring(cname.length));
    }
  }
  return null;
}

function logout() {
  document.cookie = `${SESSION_NAME}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
  window.location.href = "index.html";
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}
</script>

</body>
</html>
