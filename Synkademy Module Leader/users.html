<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synkademy | Module Leader</title>
    <link rel="stylesheet" href="users_styles.css">
</head>
<body>

    <header class="app-header">
        <div class="header-container">
            <div class="brand">
                <div class="brand-logo">S</div>
                <span class="brand-name">Synkademy</span>
            </div>
            
            <nav class="main-nav">
                <a href="./dashboard.html" class="nav-item ">Dashboard</a>
                <a href="./users.html" class="nav-item active">User Management</a>
                <a href="./metadata.html" class="nav-item">Meta Data</a>
            </nav>

            <div class="user-menu">
                <div class="user-details">
                    <span id="name" class="user-name">Loading...</span>
                    <span class="user-role">Module Leader</span>
                </div>
                <button class="btn-outline" onclick="logout()">Sign Out</button>
            </div>
        </div>
    </header>

    <main class="workspace">

        <div class="page-header">
            <div>
                <h1>User Management</h1>
                <p class="text-muted">Create and manage accounts for the Synkademy.</p>
            </div>
        </div>

        <div class="panel-tabs">
            <button class="tab-btn active" onclick="switchTab('create')">Create Users</button>
            <button class="tab-btn" onclick="switchTab('manage')">Manage Users</button>
        </div>

        <section id="create-tab" class="data-panel">
            <div class="panel-header">
                <h2>Create New Account</h2>
            </div>
            <div style="padding: 1.5rem; max-width: 600px;">
                <form id="createUserForm" onsubmit="handleUserCreation(event)">
                    
                    <div class="form-group">
                        <label>Account Role</label>
                        <select id="roleSelect" class="filter-dropdown" style="width: 100%; margin-top: 0.5rem;" onchange="toggleStudentField()">
                            <option value="student">Student</option>
                            <option value="supervisor">Supervisor</option>
                            <option value="moduleleader">Module Leader</option>
                        </select>
                    </div>

                    <div class="form-group" id="studentNumberGroup" style="margin-top: 1rem;">
                        <label>Student Number</label>
                        <input type="text" id="studentNumber" class="search-input" style="width: 100%; margin-top: 0.5rem;" placeholder="e.g. 12345" required>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label>Full Name</label>
                        <input type="text" id="fullName" class="search-input" style="width: 100%; margin-top: 0.5rem;" placeholder="Enter the Full Name" required>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label>Email Address</label>
                        <input type="email" id="email" class="search-input" style="width: 100%; margin-top: 0.5rem;" placeholder="e.g. name@student.nsbm.ac.lk" required>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label>Password (6-9 characters)</label>
                        <input type="password" id="password" class="search-input" style="width: 100%; margin-top: 0.5rem;" minlength="6" maxlength="9" required>
                    </div>

                    <div style="margin-top: 2rem; display: flex; align-items: center;">
                        <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
                        <span id="create-message" style="margin-left: 1rem; font-weight: 500; font-size: 0.9rem;"></span>
                    </div>
                </form>
            </div>
        </section>

        <section id="manage-tab" class="data-panel" style="display: none;">
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>Manage Users Directory</h2>
                <select id="manageRoleFilter" class="filter-dropdown" onchange="filterUsers()">
                    <option value="all">All Roles</option>
                    <option value="student">Students</option>
                    <option value="supervisor">Supervisors</option>
                    <option value="moduleleader">Module Leaders</option>
                </select>
            </div>
            
            <div class="table-responsive" style="padding: 1rem;">
                <table class="table" style="width: 100%; text-align: left; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 2px solid var(--border-color);">
                            <th style="padding: 1rem; color: var(--text-secondary);">Name</th>
                            <th style="padding: 1rem; color: var(--text-secondary);">Email</th>
                            <th style="padding: 1rem; color: var(--text-secondary);">Role</th>
                            <th style="padding: 1rem; color: var(--text-secondary); text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        </tbody>
                </table>
            </div>
        </section>
    
    </main>

    <div id="editUserModal" class="modal-backdrop" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); display: none; align-items: center; justify-content: center; z-index: 2000;">
        <div class="modal-container" style="background: var(--bg-surface); width: 100%; max-width: 500px; border-radius: 12px; padding: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1rem;">
                <h2 style="margin: 0;">Edit User</h2>
                <button style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary);" onclick="closeEditModal()">&times;</button>
            </div>
            
            <form id="editUserForm" onsubmit="saveUserEdits(event)">
                <input type="hidden" id="editUserId">
                <input type="hidden" id="editUserRole">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="editFullName" class="search-input" style="width: 100%; margin-top: 0.5rem;" required>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label>Email Address</label>
                    <input type="email" id="editEmail" class="search-input" style="width: 100%; margin-top: 0.5rem;" required>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label>New Password</label>
                    <input type="password" id="editPassword" class="search-input" style="width: 100%; margin-top: 0.5rem;" minlength="6" maxlength="9" placeholder="Leave blank to keep current password">
                    <small style="color: var(--text-secondary); display: block; margin-top: 0.25rem;">Only enter a password if you want to change it.</small>
                </div>

                <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: 0.5rem;">
                    <button type="button" class="btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="saveEditBtn">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
        

    <script>

    const SESSION_NAME = "synkademy_moduleleader_session";
    const user = getSession(SESSION_NAME);

    if (!user) {
        window.location.href = "index.html"; 
    } else {
        document.getElementById("name").innerText = user.fullName || "Module Leader";
    }

    function logout() {
        document.cookie = SESSION_NAME + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        window.location.href = "index.html"; 
    }

    function getSession(name) {
        const cname = name + "=";
        const cookies = decodeURIComponent(document.cookie).split(";");
        for (let c of cookies) {
            c = c.trim();
            if (c.indexOf(cname) === 0) {
                return JSON.parse(c.substring(cname.length));
            }
        }
        return null;
    }

    function switchTab(tabName) {
        const createTab = document.getElementById('create-tab');
        const manageTab = document.getElementById('manage-tab');
        const buttons = document.querySelectorAll('.tab-btn');

        buttons.forEach(btn => btn.classList.remove('active'));

        if (tabName === 'create') {
            createTab.style.display = 'block';
            manageTab.style.display = 'none';
            buttons[0].classList.add('active');
        } else {
            createTab.style.display = 'none';
            manageTab.style.display = 'block';
            buttons[1].classList.add('active');
        }
    }

    function toggleStudentField() {
        const role = document.getElementById('roleSelect').value;
        const studentGroup = document.getElementById('studentNumberGroup');
        const studentInput = document.getElementById('studentNumber');

        if (role === 'student') {
            studentGroup.style.display = 'block';
            studentInput.required = true;
        } else {
            studentGroup.style.display = 'none';
            studentInput.required = false;
            studentInput.value = ''; 
        }
    }

    async function handleUserCreation(event) {
        event.preventDefault(); 

        const moduleLeaderId = user.id || user.Id;
        if (!moduleLeaderId) {
            alert("Error: Could not verify your Module Leader ID. Please log in again.");
            return;
        }

        const role = document.getElementById('roleSelect').value;
        const submitBtn = document.getElementById('submitBtn');
        const msgSpan = document.getElementById('create-message');

        const payload = {
            ModuleLeaderId: moduleLeaderId,
            FullName: document.getElementById('fullName').value,
            Email: document.getElementById('email').value,
            Password: document.getElementById('password').value
        };

        if (role === 'student') {
            payload.StudentNumber = document.getElementById('studentNumber').value;
        }

        const endpoint = `http://localhost:5037/api/Account/create/${role}`;

        submitBtn.innerText = "Creating...";
        submitBtn.disabled = true;
        msgSpan.innerText = "";

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                msgSpan.style.color = "var(--status-success)";
                msgSpan.innerText = "✓ Account created successfully!";
                document.getElementById('createUserForm').reset();
                toggleStudentField(); 
            } else {
                const errorText = await response.text();
                msgSpan.style.color = "#DC2626"; 
                msgSpan.innerText = errorText || "Failed to create account.";
            }
        } catch (error) {
            console.error(error);
            msgSpan.style.color = "#DC2626";
            msgSpan.innerText = "Network error. Check backend server.";
        } finally {
            submitBtn.innerText = "Create Account";
            submitBtn.disabled = false;
            
            setTimeout(() => { msgSpan.innerText = ""; }, 4000);
        }
    }

    let allUsers = [];

  async function loadManageUsers() {
        try {
            const response = await fetch('http://localhost:5037/api/Account/users');
            if (response.ok) {
                allUsers = await response.json();
                filterUsers(); 
            } else {
                console.error("Failed to fetch users");
            }
        } catch (error) {
            console.error("API error:", error);
        }
    }

    function filterUsers() {
        const filterRole = document.getElementById('manageRoleFilter').value;
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';

        const filtered = filterRole === 'all' 
            ? allUsers 
            : allUsers.filter(u => u.role === filterRole);

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 2rem; color: var(--text-secondary);">No users found.</td></tr>`;
            return;
        }

        filtered.forEach(user => {
            const displayRole = user.role.charAt(0).toUpperCase() + user.role.slice(1);
            
            const tr = document.createElement('tr');
            tr.style.borderBottom = "1px solid var(--border-color)";
            tr.innerHTML = `
                <td style="padding: 1rem; font-weight: 500;">${user.name}</td>
                <td style="padding: 1rem; color: var(--text-secondary);">${user.email}</td>
                <td style="padding: 1rem;"><span style="background: #EFF6FF; color: #1D4ED8; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem;">${displayRole}</span></td>
                <td style="padding: 1rem; text-align: right;">
                    <button class="btn-outline-primary btn-sm" style="padding: 0.3rem 0.8rem; font-size: 0.8rem; border-radius: 4px;" onclick="openEditModal(${user.id}, '${user.role}')">Edit</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function openEditModal(userId, userRole) {
        const user = allUsers.find(u => u.id === userId && u.role === userRole);
        if (!user) return;

        document.getElementById('editUserId').value = user.id;
        document.getElementById('editUserRole').value = user.role;
        document.getElementById('editFullName').value = user.name;
        document.getElementById('editEmail').value = user.email;
        document.getElementById('editPassword').value = ''; 

        document.getElementById('editUserModal').style.display = 'flex';
    }

    function closeEditModal() {
        document.getElementById('editUserModal').style.display = 'none';
    }

   async function saveUserEdits(event) {
        event.preventDefault();
        const btn = document.getElementById('saveEditBtn');
        btn.innerText = "Saving...";
        
        const payload = {
            id: parseInt(document.getElementById('editUserId').value),
            role: document.getElementById('editUserRole').value,
            fullName: document.getElementById('editFullName').value,
            email: document.getElementById('editEmail').value,
            newPassword: document.getElementById('editPassword').value
        };

        try {
            const response = await fetch('http://localhost:5037/api/Account/update', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if(response.ok) {
                closeEditModal();
                await loadManageUsers(); 
            } else {
                const errorText = await response.text();
                alert(errorText || "Failed to update user.");
            }
        } catch (e) { 
            console.error(e);
            alert("Network error.");
        } finally {
            btn.innerText = "Save Changes";
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadManageUsers();
    });

</script>

</body>
</html>
