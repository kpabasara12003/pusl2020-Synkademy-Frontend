<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Proposal | Synkademy</title>
  <link rel="stylesheet" href="submit_N.css">
  <style>
    /* Custom styles for the checkbox lists */
    .checkbox-container {
      max-height: 200px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: background 0.2s;
    }
    .checkbox-item:hover { background: #f5f5f5; }
    .checkbox-item input { cursor: pointer; width: 16px; height: 16px; }
  </style>
</head>
<body>
  <a class="back-home" href="dashboard.html">Back to Dashboard</a>

  <div class="container">
    <div class="hero">
      <div class="hero-text">
        <div class="hero-badge">New Submission</div>
        <h1>Submit New Project</h1>
        <p>Register your proposal for the Synkademy matching process.</p>
      </div>
    </div>

    <div class="grid">
      <div class="left">
        <div class="card">
          <div class="card-header"><h3>Project Details</h3></div>
          <div class="field-group">
            <label class="field-label">Project Title *</label>
            <input type="text" id="proj-title" placeholder="e.g. Smart Campus Navigation">
          </div>
          <div class="field-group">
            <label class="field-label">Short Description *</label>
            <textarea id="proj-short" rows="2" placeholder="One sentence summary..."></textarea>
          </div>
          <div class="field-group">
            <label class="field-label">Abstract * (Min 100 chars)</label>
            <textarea id="proj-abstract" rows="4" placeholder="Detailed breakdown..."></textarea>
          </div>
          <div class="field-group">
            <label class="field-label">Tech Stack</label>
            <input type="text" id="techStack" placeholder="e.g. Flutter, Firebase, C#">
          </div>
        </div>
      </div>

      <div class="right">
        <div class="status-card">
          <p class="cat-label" style="margin-top:15px; font-weight:600;">Research Areas (Select Multiple)</p>
          <div id="researchList" class="checkbox-container">Loading...</div>

          <p class="cat-label" style="margin-top:15px; font-weight:600;">Tags (Select Multiple)</p>
          <div id="tagsList" class="checkbox-container">Loading...</div>

          <button class="submit-btn" style="margin-top:20px;" onclick="handleSubmit()">Submit Project</button>
          <div id="toast" class="success-toast" style="display:none; margin-top:10px;"></div>
        </div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = "http://localhost:5037"; // Match your backend port

  function getCookie(name) {
    const cookies = document.cookie.split("; ");
    for (const c of cookies) {
      const [key, val] = c.split("=");
      if (key === name) return decodeURIComponent(val);
    }
    return null;
  }

  function getLoggedInStudentId() {
    return sessionStorage.getItem("studentId") || getCookie("userId");
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadCheckboxData('/api/ResearchAreas', 'researchList', 'research-item');
    loadCheckboxData('/api/Tags', 'tagsList', 'tag-item');
  });

  // Fetch from API and create Checkbox UI
  async function loadCheckboxData(endpoint, containerId, className) {
    const container = document.getElementById(containerId);
    try {
      const res = await fetch(API_BASE + endpoint);
      const data = await res.json();
      container.innerHTML = ''; // Clear loading text

      data.forEach(item => {
        const label = document.createElement('label');
        label.className = 'checkbox-item';
        // HTML for the checkbox
        label.innerHTML = `
          <input type="checkbox" class="${className}" value="${item.id || item.Id}">
          <span>${item.name || item.Name}</span>
        `;
        container.appendChild(label);
      });
    } catch (err) {
      container.innerHTML = '<p style="color:red">Failed to load options.</p>';
    }
  }

  async function handleSubmit() {
    const toast = document.getElementById('toast');
    const studentId = parseInt(getLoggedInStudentId(), 10);
    
    // 1. Collect Basic Info
    const payload = {
      studentId,
      title: document.getElementById('proj-title').value.trim(),
      shortDescription: document.getElementById('proj-short').value.trim(),
      abstract: document.getElementById('proj-abstract').value.trim(),
      techStack: document.getElementById('techStack').value.trim(),
      
      // 2. Collect Checked Research Areas
      researchAreas: Array.from(document.querySelectorAll('.research-item:checked'))
                          .map(cb => parseInt(cb.value)),
      
      // 3. Collect Checked Tags
      tags: Array.from(document.querySelectorAll('.tag-item:checked'))
                 .map(cb => parseInt(cb.value))
    };

    // Validation
    if (!payload.studentId || !payload.title || payload.abstract.length < 100) {
      showToast("Please log in again or check the abstract length.", "error");
      return;
    }
    if (payload.researchAreas.length === 0) {
      showToast("Select at least one research area.", "error");
      return;
    }

    try {
      const response = await fetch(`${API_BASE}/api/Projects/create`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        showToast("Project successfully submitted!", "success");
        setTimeout(() => window.location.href = "dashboard.html", 2000);
      } else {
        const msg = await response.text();
        showToast("Error: " + msg, "error");
      }
    } catch (err) {
      showToast("Network Error: Is the API running?", "error");
    }
  }

  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `success-toast ${type}`;
    toast.style.display = 'block';
  }
</script>
</body>
</html>
