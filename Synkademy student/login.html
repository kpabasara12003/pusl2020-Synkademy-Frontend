<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal Login</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- CSS File -->
  <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="page-wrapper">

  <!-- LEFT SIDE -->
  <div class="left-panel">
    <h1 class="hero-title">Start Your <span>Research</span> Journey</h1>
    <p class="hero-sub">Focus. Build. Achieve your academic goals.</p>

    <div class="features">
      <div class="card">⚡ Fast Access</div>
      <div class="card">🎯 Focus Mode</div>
      <div class="card">📊 Dashboard</div>
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div class="right-panel">
    <div class="login-card">

      <h2>Login</h2>

      <!-- FORM START -->
      <form action="#" method="POST">

        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />

        <!-- Forgot Password -->
        <div class="form-options">
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit">Login & Start Working</button>

      </form>
      <!-- FORM END -->

      <p class="small-text">Stay consistent. Build your future.</p>

    </div>
  </div>

</div>

</body>
</html>
